version: "3.9"

services:
  # ── Vector DB ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports: ["6333:6333", "6334:6334"]
    volumes: ["./qdrant_storage:/qdrant/storage"]
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────────
  redis:
    image: valkey/valkey:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s

  # ── RAG API ───────────────────────────────────────────────────────
  rag-api:
    build:
      context: ../..
      dockerfile: backend/docker_files/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    environment:
      RAG__VECTORDB__QDRANT_URL: http://qdrant:6333
      RAG__REDIS_URL: redis://redis:6379
    depends_on:
      qdrant: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - "./docs:/app/docs:ro"
    command: uvicorn gernas_rag.main:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s

volumes:
  qdrant_storage:
