version: "3.9"

# Alternative stack using Milvus instead of Qdrant.
# Usage: docker compose -f docker-compose.milvus.yml up -d

services:
  # ── Milvus dependencies ────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./milvus_storage/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./milvus_storage/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./milvus_storage/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Cache ─────────────────────────────────────────────────────────
  redis:
    image: valkey/valkey:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s

  # ── RAG API ───────────────────────────────────────────────────────
  rag-api:
    build:
      context: ../..
      dockerfile: backend/docker_files/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    environment:
      RAG__VECTORDB__PROVIDER: milvus
      RAG__VECTORDB__MILVUS_HOST: milvus
      RAG__VECTORDB__MILVUS_PORT: "19530"
      RAG__REDIS_URL: redis://redis:6379
    depends_on:
      milvus: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - "./docs:/app/docs:ro"
    command: uvicorn gernas_rag.main:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
